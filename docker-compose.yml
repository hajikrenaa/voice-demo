services:
  backend:
    build: ./backend
    container_name: voice-agent-backend
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      # .env is excluded from the image (backend/.dockerignore) — bind-mount it so
      # the UI's "API Keys & Configuration" tab (PUT /api/settings writes /app/.env)
      # persists key changes to the HOST file, surviving restarts and redeploys.
      - ./backend/.env:/app/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: voice-agent-frontend
    ports:
      - "80:80"
      - "3000:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
