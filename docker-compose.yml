services:
  backend:
    build: ./backend
    container_name: voice-agent-backend
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: voice-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
